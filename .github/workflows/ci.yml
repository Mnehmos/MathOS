name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install MathOS
        run: python -m pip install -e .
      - name: Compile and test
        env:
          PYTHONWARNINGS: error::ResourceWarning
        run: |
          python -m compileall -q src tests
          python -m unittest discover -s tests -v
      - name: Run canonical vertical slice
        run: mathos demo --workspace .ci-demo --reset
      - name: Validate every RL export
        run: |
          for trajectory in .ci-demo/exports/*.json; do
            mathos validate-export --input "$trajectory"
          done
      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir dist .
      - name: Smoke test installed wheel
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install --no-index dist/*.whl
          .wheel-venv/bin/mathos demo --workspace .wheel-demo --reset
          for trajectory in .wheel-demo/exports/*.json; do
            .wheel-venv/bin/mathos validate-export --input "$trajectory"
          done
          .wheel-venv/bin/python -m pip check
