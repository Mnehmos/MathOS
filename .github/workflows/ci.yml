name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Report pinned toolchain
        run: rustup show active-toolchain
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint with warnings denied
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run unit and integration tests
        run: cargo test --workspace

  storage-smoke:
    name: Real storage smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Initialize instance
        run: cargo run -- --root "${{ runner.temp }}/mcl-ci" --json init --actor github-actions --idempotency-key phase1-storage-smoke
      - name: Check storage health
        run: cargo run -- --root "${{ runner.temp }}/mcl-ci" --json health

  lean-toolchain:
    name: Pinned Lean availability
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install repository-pinned Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          auto-config: false
          use-github-cache: false
      - name: Report exact Lean version
        run: lean --version

  legacy-python-regression:
    name: Legacy Python regression evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install legacy package
        run: python -m pip install -e .
      - name: Compile and test legacy slice
        env:
          PYTHONWARNINGS: error::ResourceWarning
        run: |
          python -m compileall -q src tests
          python -m unittest discover -s tests -v
