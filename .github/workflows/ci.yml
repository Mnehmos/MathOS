name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Report pinned toolchain
        run: rustup show active-toolchain
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint with warnings denied
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run unit and integration tests
        run: cargo test --workspace

  storage-smoke:
    name: Real storage smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Initialize instance
        run: cargo run -- --root "${{ runner.temp }}/mcl-ci" --json init --actor github-actions --idempotency-key phase1-storage-smoke
      - name: Check storage health
        run: cargo run -- --root "${{ runner.temp }}/mcl-ci" --json health

  lean-toolchain:
    name: Pinned Lean availability
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install repository-pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/elan.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "${archive}" \
            https://github.com/leanprover/elan/releases/download/v4.2.3/elan-x86_64-unknown-linux-gnu.tar.gz
          echo "df0b2b3a439961ffcbb3985214365ffe40f49bc871df04dff268c7d8e21ca8b2  ${archive}" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}"
          "${RUNNER_TEMP}/elan-init" -y --default-toolchain none --no-modify-path
          echo "${HOME}/.elan/bin" >> "${GITHUB_PATH}"
          "${HOME}/.elan/bin/elan" toolchain install "$(cat lean-toolchain)"
      - name: Report exact Lean version
        shell: bash
        run: |
          set -euo pipefail
          lean --version | tee "${RUNNER_TEMP}/lean-version.txt"
          grep --fixed-strings "Lean (version 4.32.0," "${RUNNER_TEMP}/lean-version.txt"
      - name: Prove the repaired Pilot A theorem has no axioms
        shell: bash
        run: |
          set -euo pipefail
          driver="${RUNNER_TEMP}/PilotARepairedProofAudit.lean"
          output="${RUNNER_TEMP}/PilotARepairedProofAudit.txt"
          cp fixtures/publication/PilotARefutation.lean "${driver}"
          printf '\n#print axioms MathOS.PilotA.every_prime_other_than_two_is_odd\n' >>"${driver}"
          lean -DwarningAsError=true "${driver}" 2>&1 | tee "${output}"
          grep --fixed-strings --line-regexp \
            "'MathOS.PilotA.every_prime_other_than_two_is_odd' does not depend on any axioms" \
            "${output}"
      - name: Install publication isolation control
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap jq util-linux
          /usr/bin/bwrap --version
          /usr/bin/prlimit --version
          jq --version
      - name: Run real contained Lean worker integration
        shell: bash
        env:
          MCL_RUN_LEAN_INTEGRATION: "1"
        run: cargo test --test lean_worker -- --nocapture
      - name: Exercise publication isolation boundary without authority
        shell: bash
        run: scripts/publication-smoke.sh "${RUNNER_TEMP}/publication-smoke"
      - name: Exercise non-attested simulated-main candidate without authority
        shell: bash
        env:
          PUBLICATION_CONTEXT_MODE: simulated-main
          PUBLICATION_REPOSITORY: Mnehmos/MathOS
          PUBLICATION_WORKFLOW_PATH: .github/workflows/publication.yml
          PUBLICATION_WORKFLOW_REF: Mnehmos/MathOS/.github/workflows/publication.yml@refs/heads/main
          PUBLICATION_SOURCE_REF: refs/heads/main
          PUBLICATION_SOURCE_COMMIT_SHA: ${{ github.sha }}
          PUBLICATION_WORKFLOW_RUN_ID: ${{ github.run_id }}
          PUBLICATION_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          PUBLICATION_RUNNER_ENVIRONMENT: github_hosted
        run: |
          set -euo pipefail
          cargo build --locked --bin mcl
          export PUBLICATION_SOURCE_TREE_SHA
          PUBLICATION_SOURCE_TREE_SHA="$(git rev-parse 'HEAD^{tree}')"
          candidate="${RUNNER_TEMP}/publication-candidate-simulated-main"
          bash scripts/publication-candidate.sh "${candidate}"
          if bash scripts/publication-candidate.sh \
            "${candidate}/repaired-proof-without-repair" \
            repaired-proof \
            "${candidate}" \
            >"${RUNNER_TEMP}/unexpected-repaired-proof.json" \
            2>"${RUNNER_TEMP}/expected-missing-repair.txt"; then
            echo "repaired proof candidate was created without the atomic repair" >&2
            exit 1
          fi
          grep --fixed-strings \
            "repaired proof requires the retained atomic repair in canonical state" \
            "${RUNNER_TEMP}/expected-missing-repair.txt"
      - name: Exercise staged-CAS ingestion barrier without authority
        shell: bash
        run: |
          set -euo pipefail
          candidate="${RUNNER_TEMP}/publication-candidate-simulated-main"
          bundle="${candidate}/simulated-attestation.json"
          jq -cS -n '{mediaType:"application/vnd.dev.sigstore.bundle.v0.3+json",verificationMaterial:{},dsseEnvelope:{}}' \
            | tr -d '\n' >"${bundle}"
          report_hash="$(sha256sum "${candidate}/publication-report.json" | cut -d ' ' -f 1)"
          bundle_hash="$(sha256sum "${bundle}" | cut -d ' ' -f 1)"
          stage_args=(
            --root "${candidate}" --json verify stage-publication-candidate
            --report-file publication-report.json
            --retained-closure-file publication-retained-closure.json
            --retained-root .
            --attestation-bundle-file simulated-attestation.json
            --actor simulated-ci
            --idempotency-key "simulated-stage:${report_hash}:${bundle_hash}"
          )
          target/debug/mcl "${stage_args[@]}" --dry-run >"${RUNNER_TEMP}/stage-dry-run.json"
          jq -e '.dry_run == true and .stage == null and .authoritative == false' \
            "${RUNNER_TEMP}/stage-dry-run.json" >/dev/null
          target/debug/mcl "${stage_args[@]}" >"${RUNNER_TEMP}/stage.json"
          target/debug/mcl "${stage_args[@]}" >"${RUNNER_TEMP}/stage-retry.json"
          cmp "${RUNNER_TEMP}/stage.json" "${RUNNER_TEMP}/stage-retry.json"
          jq -e '.dry_run == false and .stage.stage.authoritative == false and .authoritative == false' \
            "${RUNNER_TEMP}/stage.json" >/dev/null
          report_cas="${candidate}/.mcl/artifacts/sha256/${report_hash:0:2}/${report_hash:2:2}/${report_hash}"
          report_backup="${RUNNER_TEMP}/staged-report.backup"
          mv "${report_cas}" "${report_backup}"
          if target/debug/mcl --root "${candidate}" --json verify ingest-publication \
            --report-artifact-hash "${report_hash}" \
            --attestation-bundle-artifact-hash "${bundle_hash}" \
            --actor simulated-ci \
            --idempotency-key "simulated-ingestion-missing:${report_hash}:${bundle_hash}" \
            >"${RUNNER_TEMP}/unexpected-missing-ingestion.json" \
            2>"${RUNNER_TEMP}/expected-missing-ingestion-error.json"; then
            echo "candidate with a missing staged report crossed the ingestion boundary" >&2
            exit 1
          fi
          jq -e '.code == "MCL_PUBLICATION_STAGE_MEMBER_MISSING"' \
            "${RUNNER_TEMP}/expected-missing-ingestion-error.json" >/dev/null
          mv "${report_backup}" "${report_cas}"
          cp "${report_cas}" "${report_backup}"
          printf 'altered staged report' >"${report_cas}"
          if target/debug/mcl --root "${candidate}" --json verify ingest-publication \
            --report-artifact-hash "${report_hash}" \
            --attestation-bundle-artifact-hash "${bundle_hash}" \
            --actor simulated-ci \
            --idempotency-key "simulated-ingestion-altered:${report_hash}:${bundle_hash}" \
            >"${RUNNER_TEMP}/unexpected-altered-ingestion.json" \
            2>"${RUNNER_TEMP}/expected-altered-ingestion-error.json"; then
            echo "candidate with an altered staged report crossed the ingestion boundary" >&2
            exit 1
          fi
          jq -e '.code == "MCL_PUBLICATION_STAGE_MEMBER_MISMATCH"' \
            "${RUNNER_TEMP}/expected-altered-ingestion-error.json" >/dev/null
          mv "${report_backup}" "${report_cas}"
          fake_bin="${RUNNER_TEMP}/unpinned-publication-verifier"
          mkdir -p "${fake_bin}"
          printf '#!/usr/bin/env sh\necho unpinned verifier must never execute >&2\nexit 97\n' >"${fake_bin}/gh"
          chmod 500 "${fake_bin}/gh"
          if PATH="${fake_bin}:${PATH}" target/debug/mcl --root "${candidate}" --json verify ingest-publication \
            --report-artifact-hash "${report_hash}" \
            --attestation-bundle-artifact-hash "${bundle_hash}" \
            --actor simulated-ci \
            --idempotency-key "simulated-ingestion-unpinned:${report_hash}:${bundle_hash}" \
            >"${RUNNER_TEMP}/unexpected-ingestion.json" \
            2>"${RUNNER_TEMP}/expected-ingestion-error.json"; then
            echo "unpinned verifier crossed the ingestion boundary" >&2
            exit 1
          fi
          jq -e '.code == "MCL_PUBLICATION_VERIFIER_PIN_MISMATCH"' \
            "${RUNNER_TEMP}/expected-ingestion-error.json" >/dev/null
          target/debug/mcl --root "${candidate}" --json doctor \
            | jq -e '.healthy == true and ([.checks[] | select(.name == "artifact_inventory" and .healthy == true)] | length) == 1' >/dev/null
      - name: Retain a failed simulated candidate attempt
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: publication-candidate-failure-${{ github.sha }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            ${{ runner.temp }}/publication-candidate-simulated-main/attempt/
            ${{ runner.temp }}/publication-candidate-simulated-main/closure/
            ${{ runner.temp }}/publication-candidate-simulated-main/publication-retained-closure.json
            ${{ runner.temp }}/publication-candidate-simulated-main/publication-report.json
            ${{ runner.temp }}/publication-candidate-simulated-main/repaired-proof-without-repair/attempt/

  legacy-python-regression:
    name: Legacy Python regression evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install legacy package
        run: python -m pip install -e .
      - name: Compile and test legacy slice
        env:
          PYTHONWARNINGS: error::ResourceWarning
        run: |
          python -m compileall -q src tests
          python -m unittest discover -s tests -v
