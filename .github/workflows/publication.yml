name: Publication authority boundary

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publication-${{ github.ref }}
  cancel-in-progress: false

jobs:
  boundary:
    name: Attested publication candidate boundary
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Check out exact source without credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Require protected main ref
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_PROTECTED:-}" == "true" ]] || {
            echo "publication candidate requires an actively protected main ref" >&2
            exit 65
          }
      - name: Install repository-pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/elan.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "${archive}" \
            https://github.com/leanprover/elan/releases/download/v4.2.3/elan-x86_64-unknown-linux-gnu.tar.gz
          echo "df0b2b3a439961ffcbb3985214365ffe40f49bc871df04dff268c7d8e21ca8b2  ${archive}" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}"
          "${RUNNER_TEMP}/elan-init" -y --default-toolchain none --no-modify-path
          echo "${HOME}/.elan/bin" >> "${GITHUB_PATH}"
          "${HOME}/.elan/bin/elan" toolchain install "$(cat lean-toolchain)"
      - name: Install publication isolation control
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap jq util-linux
          /usr/bin/bwrap --version
          /usr/bin/prlimit --version
          jq --version
      - name: Build the reviewed candidate generator
        shell: bash
        run: cargo build --locked --bin mcl
      - name: Install pinned attestation verifier
        shell: bash
        run: |
          set -euo pipefail
          version="2.96.0"
          archive="${RUNNER_TEMP}/gh_${version}_linux_amd64.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/cli/cli/releases/download/v${version}/gh_${version}_linux_amd64.tar.gz"
          echo "83d5c2ccad5498f58bf6368acb1ab32588cf43ab3a4b1c301bf36328b1c8bd60  ${archive}" \
            | sha256sum --check --strict
          tar --extract --gzip --no-same-owner --file "${archive}" --directory "${RUNNER_TEMP}"
          gh_bin="${RUNNER_TEMP}/gh_${version}_linux_amd64/bin/gh"
          echo "56b8bbbb27b066ecb33dbef9a256dc9d1314adaeff0908a752feba6c34053b40  ${gh_bin}" \
            | sha256sum --check --strict
          echo "${RUNNER_TEMP}/gh_${version}_linux_amd64/bin" >> "${GITHUB_PATH}"
      - name: Run clean isolated boundary smoke
        shell: bash
        run: scripts/publication-smoke.sh "${RUNNER_TEMP}/publication-smoke"
      - name: Attest exact smoke report
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ runner.temp }}/publication-smoke/publication-smoke-report.json
      - name: Verify exact attestation and retain the challenge result
        shell: bash
        env:
          PUBLICATION_GH_BIN: ${{ runner.temp }}/gh_2.96.0_linux_amd64/bin/gh
          SMOKE_BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          scripts/publication-attestation-verify.sh \
            "${RUNNER_TEMP}/publication-smoke/publication-smoke-report.json" \
            "${SMOKE_BUNDLE_PATH}" \
            "${RUNNER_TEMP}/publication-attestation-verification"
      - name: Build and validate the exact protected candidate closure
        shell: bash
        env:
          PUBLICATION_CONTEXT_MODE: protected-main
          PUBLICATION_REPOSITORY: ${{ github.repository }}
          PUBLICATION_WORKFLOW_PATH: .github/workflows/publication.yml
          PUBLICATION_WORKFLOW_REF: ${{ github.workflow_ref }}
          PUBLICATION_SOURCE_REF: ${{ github.ref }}
          PUBLICATION_SOURCE_COMMIT_SHA: ${{ github.sha }}
          PUBLICATION_WORKFLOW_RUN_ID: ${{ github.run_id }}
          PUBLICATION_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          PUBLICATION_RUNNER_ENVIRONMENT: github_hosted
        run: |
          set -euo pipefail
          export PUBLICATION_SOURCE_TREE_SHA
          PUBLICATION_SOURCE_TREE_SHA="$(git rev-parse 'HEAD^{tree}')"
          bash scripts/publication-candidate.sh "${RUNNER_TEMP}/publication-candidate"
      - name: Attest exact protected candidate report
        id: attest_candidate
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ runner.temp }}/publication-candidate/publication-report.json
      - name: Verify exact candidate attestation and retain the challenge result
        shell: bash
        env:
          PUBLICATION_GH_BIN: ${{ runner.temp }}/gh_2.96.0_linux_amd64/bin/gh
          CANDIDATE_BUNDLE_PATH: ${{ steps.attest_candidate.outputs.bundle-path }}
        run: |
          scripts/publication-attestation-verify.sh \
            "${RUNNER_TEMP}/publication-candidate/publication-report.json" \
            "${CANDIDATE_BUNDLE_PATH}" \
            "${RUNNER_TEMP}/publication-candidate-attestation-verification"
      - name: Stage, ingest, and promote the exact candidate through MathOS
        shell: bash
        env:
          CANDIDATE_BUNDLE_PATH: ${{ steps.attest_candidate.outputs.bundle-path }}
        run: |
          scripts/publication-ingest.sh \
            "${RUNNER_TEMP}/publication-candidate" \
            "${CANDIDATE_BUNDLE_PATH}" \
            "${RUNNER_TEMP}/publication-candidate/refutation-ingestion"
      - name: Build and validate the repaired claim proof in canonical state
        shell: bash
        env:
          PUBLICATION_CONTEXT_MODE: protected-main
          PUBLICATION_REPOSITORY: ${{ github.repository }}
          PUBLICATION_WORKFLOW_PATH: .github/workflows/publication.yml
          PUBLICATION_WORKFLOW_REF: ${{ github.workflow_ref }}
          PUBLICATION_SOURCE_REF: ${{ github.ref }}
          PUBLICATION_SOURCE_COMMIT_SHA: ${{ github.sha }}
          PUBLICATION_WORKFLOW_RUN_ID: ${{ github.run_id }}
          PUBLICATION_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          PUBLICATION_RUNNER_ENVIRONMENT: github_hosted
        run: |
          set -euo pipefail
          export PUBLICATION_SOURCE_TREE_SHA
          PUBLICATION_SOURCE_TREE_SHA="$(git rev-parse 'HEAD^{tree}')"
          bash scripts/publication-candidate.sh \
            "${RUNNER_TEMP}/publication-candidate/repaired-proof-candidate" \
            repaired-proof \
            "${RUNNER_TEMP}/publication-candidate"
      - name: Attest exact repaired claim proof report
        id: attest_repaired_proof
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ runner.temp }}/publication-candidate/repaired-proof-candidate/publication-report.json
      - name: Verify exact repaired proof attestation and retain the challenge result
        shell: bash
        env:
          PUBLICATION_GH_BIN: ${{ runner.temp }}/gh_2.96.0_linux_amd64/bin/gh
          REPAIRED_PROOF_BUNDLE_PATH: ${{ steps.attest_repaired_proof.outputs.bundle-path }}
        run: |
          scripts/publication-attestation-verify.sh \
            "${RUNNER_TEMP}/publication-candidate/repaired-proof-candidate/publication-report.json" \
            "${REPAIRED_PROOF_BUNDLE_PATH}" \
            "${RUNNER_TEMP}/publication-candidate/repaired-proof-attestation-verification"
      - name: Ingest and promote the repaired proof without inherited evidence
        shell: bash
        env:
          REPAIRED_PROOF_BUNDLE_PATH: ${{ steps.attest_repaired_proof.outputs.bundle-path }}
        run: |
          scripts/publication-ingest.sh \
            "${RUNNER_TEMP}/publication-candidate/repaired-proof-candidate" \
            "${REPAIRED_PROOF_BUNDLE_PATH}" \
            "${RUNNER_TEMP}/publication-candidate/repaired-proof-ingestion" \
            "${RUNNER_TEMP}/publication-candidate"
      - name: Build, replay, and corpus-export private Pilot A without SQLite
        shell: bash
        run: |
          bash scripts/release-pilot-a.sh \
            "${RUNNER_TEMP}/publication-candidate" \
            "${RUNNER_TEMP}/publication-candidate/repaired-proof-candidate" \
            "${RUNNER_TEMP}/publication-candidate/repaired-proof-ingestion" \
            "${RUNNER_TEMP}/pilot-a-portable-release" \
            "${RUNNER_TEMP}/pilot-a-mathcorpus-mcip-export"
      - name: Retain smoke, candidate closures, release, corpus export, diagnostics, and Sigstore bundles
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: publication-boundary-${{ github.sha }}
          if-no-files-found: error
          retention-days: 90
          path: |
            ${{ runner.temp }}/publication-smoke/
            ${{ runner.temp }}/publication-attestation-verification/
            ${{ steps.attest.outputs.bundle-path }}
            ${{ runner.temp }}/publication-candidate/attempt/
            ${{ runner.temp }}/publication-candidate/closure/
            ${{ runner.temp }}/publication-candidate/publication-retained-closure.json
            ${{ runner.temp }}/publication-candidate/publication-report.json
            ${{ runner.temp }}/publication-candidate-attestation-verification/
            ${{ runner.temp }}/publication-candidate/refutation-ingestion/
            ${{ steps.attest_candidate.outputs.bundle-path }}
            ${{ runner.temp }}/publication-candidate/repaired-proof-candidate/attempt/
            ${{ runner.temp }}/publication-candidate/repaired-proof-candidate/closure/
            ${{ runner.temp }}/publication-candidate/repaired-proof-candidate/publication-retained-closure.json
            ${{ runner.temp }}/publication-candidate/repaired-proof-candidate/publication-report.json
            ${{ runner.temp }}/publication-candidate/repaired-proof-attestation-verification/
            ${{ runner.temp }}/publication-candidate/repaired-proof-ingestion/
            ${{ steps.attest_repaired_proof.outputs.bundle-path }}
            ${{ runner.temp }}/publication-candidate/release-build-evidence/
            ${{ runner.temp }}/pilot-a-portable-release/
            ${{ runner.temp }}/pilot-a-mathcorpus-mcip-export/
